# Configuration for the Docker Compose stack.
# The explorer container uses this via the --config flag set in docker-compose.yaml.
# The sidecar is expected to be running on the host machine (host.docker.internal:4001).

database:
  endpoints:
    - host: postgres
      port: 5432
  user: postgres
  password: postgres
  dbname: explorer
  max_conns: 20

sidecar:
  connection:
    endpoint:
      host: host.docker.internal
      port: 4001
    tls:
      # TLS mode for the gRPC connection to the sidecar.
      # Supported values:
      #   none  — plaintext (default, no certificates needed).
      #   tls   — server-side TLS: client verifies the sidecar's cert.
      #           Requires ca-cert-paths pointing to the sidecar CA certificate.
      #   mtls  — mutual TLS: both sides verify each other.
      #           Requires ca-cert-paths + cert-path + key-path (client cert/key).
      mode: none
      # ca-cert-paths:
      #   - /path/to/sidecar-ca.pem
      # cert-path: /path/to/client.pem      # mtls only
      # key-path:  /path/to/client-key.pem  # mtls only
  start_block: 0

buffer:
  raw_channel_size: 500
  proc_channel_size: 500

workers:
  processor_count: 4
  writer_count: 4

server:
  rest:
    endpoint:
      host: 0.0.0.0
      port: 8080
    read_header_timeout: 10s
    default_tx_limit: 50
