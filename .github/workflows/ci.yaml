name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      checks: write  # Required by golangci-lint-action v7+ for inline PR annotations
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Go
        uses: actions/setup-go@f111f3307d8850f501ac008e886eec1fd1932a34  # v5.3.0
        with:
          go-version: '1.24'

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20  # v9.2.0
        with:
          version: v2.10.1

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16.9-alpine3.21
        env:
          POSTGRES_USER: yugabyte
          POSTGRES_PASSWORD: yugabyte
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Go
        uses: actions/setup-go@f111f3307d8850f501ac008e886eec1fd1932a34  # v5.3.0
        with:
          go-version: '1.24'

      - name: Run tests
        run: go test -count=1 ./pkg/...

  check-sqlc-generation:
    name: Validate SQLC Generated Code
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Go
        uses: actions/setup-go@f111f3307d8850f501ac008e886eec1fd1932a34  # v5.3.0
        with:
          go-version: '1.24'

      - name: Install sqlc
        run: |
          curl -sSfL -o sqlc.tar.gz https://github.com/sqlc-dev/sqlc/releases/download/v1.30.0/sqlc_1.30.0_linux_amd64.tar.gz
          echo "468aecee071bfe55e97fcbcac52ea0208eeca444f67736f3b8f0f3d6a106132e  sqlc.tar.gz" | sha256sum --check
          tar xzf sqlc.tar.gz
          sudo mv sqlc /usr/local/bin/
          sqlc version

      - name: Generate code with sqlc
        run: make sqlc

      - name: Check for uncommitted changes
        run: |
          if ! git diff --exit-code pkg/db/sqlc/; then
            echo "❌ Error: Generated SQLC code is out of sync with SQL files!"
            echo ""
            echo "The following files have differences:"
            git diff --name-only pkg/db/sqlc/
            echo ""
            echo "To fix this, run 'sqlc generate' locally and commit the changes."
            exit 1
          fi
          echo "✅ Generated code is in sync with SQL files"
