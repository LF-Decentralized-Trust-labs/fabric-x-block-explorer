openapi: "3.0.3"
info:
  title: Fabric-X Block Explorer API
  version: "0.1.0"
  license:
    name: Apache-2.0
    url: https://www.apache.org/licenses/LICENSE-2.0

servers:
  - url: http://127.0.0.1:8080
    description: Local development server

tags:
  - name: Blocks
    description: Block-level queries
  - name: Transactions
    description: Transaction-level queries
  - name: Namespaces
    description: Namespace policy queries

paths:
  /blocks/height:
    get:
      summary: Get current block height
      operationId: getBlockHeight
      tags: [Blocks]
      responses:
        "200":
          description: Current block height
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlockHeightResponse"
              example:
                height: 50
        "500":
          $ref: "#/components/responses/InternalError"

  /blocks:
    get:
      summary: List block summaries
      operationId: listBlocks
      tags: [Blocks]
      parameters:
        - name: from
          in: query
          description: Start block number (inclusive)
          schema:
            type: integer
            format: int64
            minimum: 0
        - name: to
          in: query
          description: End block number (inclusive)
          schema:
            type: integer
            format: int64
            minimum: 0
        - name: limit
          in: query
          description: Maximum number of blocks to return
          schema:
            type: integer
            format: int32
            minimum: 0
        - name: offset
          in: query
          description: Number of blocks to skip
          schema:
            type: integer
            format: int32
            minimum: 0
      responses:
        "200":
          description: List of block summaries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListBlocksResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"

  /blocks/{block_num}:
    get:
      summary: Get block by number
      operationId: getBlockByNumber
      tags: [Blocks]
      parameters:
        - name: block_num
          in: path
          required: true
          description: Block number
          schema:
            type: integer
            format: int64
            minimum: 0
          example: 2
        - name: tx_limit
          in: query
          description: Maximum number of transactions to include
          schema:
            type: integer
            format: int32
            minimum: 0
        - name: tx_offset
          in: query
          description: Number of transactions to skip
          schema:
            type: integer
            format: int32
            minimum: 0
      responses:
        "200":
          description: Block detail including transactions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Block"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /transactions/{tx_id}:
    get:
      summary: Get transaction detail
      operationId: getTransactionDetail
      tags: [Transactions]
      parameters:
        - name: tx_id
          in: path
          required: true
          description: Hex-encoded transaction ID (copy directly from block detail responses)
          schema:
            type: string
          example: "3a4f9c1d..."
      responses:
        "200":
          description: Transaction detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /namespaces/{namespace}/policies:
    get:
      summary: Get namespace policies
      operationId: getNamespacePolicies
      tags: [Namespaces]
      parameters:
        - name: namespace
          in: path
          required: true
          description: Namespace identifier (use `_meta` for channel-level policies)
          schema:
            type: string
          example: "_meta"
      responses:
        "200":
          description: Namespace policy rows
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NamespacePoliciesResponse"
        "500":
          $ref: "#/components/responses/InternalError"

components:
  schemas:

    BlockHeightResponse:
      type: object
      properties:
        height:
          type: integer
          format: int64
          example: 50

    BlockSummary:
      type: object
      properties:
        block_num:
          type: integer
          format: int64
          example: 2
        tx_count:
          type: integer
          format: int32
          example: 1024
        previous_hash:
          type: string
          format: byte
          description: Base64-encoded previous block hash
        data_hash:
          type: string
          format: byte
          description: Base64-encoded data hash

    ListBlocksResponse:
      type: object
      properties:
        blocks:
          type: array
          items:
            $ref: "#/components/schemas/BlockSummary"

    Block:
      type: object
      properties:
        block_num:
          type: integer
          format: int64
          example: 2
        tx_count:
          type: integer
          format: int32
          example: 3
        previous_hash:
          type: string
          format: byte
          description: Base64-encoded previous block hash
        data_hash:
          type: string
          format: byte
          description: Base64-encoded data hash
        transactions:
          type: array
          items:
            $ref: "#/components/schemas/Transaction"

    Transaction:
      type: object
      properties:
        tx_id:
          type: string
          description: Hex-encoded transaction ID
          example: "3a4f9c1d..."
        validation_code:
          type: string
          description: Fabric validation status (e.g. VALID, MVCC_READ_CONFLICT)
          example: "VALID"
        blind_writes:
          type: array
          items:
            $ref: "#/components/schemas/BlindWriteRow"
        endorsements:
          type: array
          items:
            $ref: "#/components/schemas/EndorsementRow"
        read_writes:
          type: array
          items:
            $ref: "#/components/schemas/ReadWriteRow"
        reads_only:
          type: array
          items:
            $ref: "#/components/schemas/ReadOnlyRow"

    BlindWriteRow:
      type: object
      properties:
        key:
          type: string
          format: byte
          description: Base64-encoded key
        value:
          type: string
          format: byte
          description: Base64-encoded value

    EndorsementRow:
      type: object
      properties:
        endorsement:
          type: string
          format: byte
          description: Base64-encoded endorsement bytes
        msp_id:
          type: string
          nullable: true
          example: "Org1MSP"
        identity:
          type: string
          format: byte
          description: Base64-encoded signer identity bytes

    ReadWriteRow:
      type: object
      properties:
        key:
          type: string
          format: byte
          description: Base64-encoded key
        read_version:
          type: integer
          format: int64
          nullable: true
          description: Read version; absent when not set
        value:
          type: string
          format: byte
          description: Base64-encoded written value

    ReadOnlyRow:
      type: object
      properties:
        key:
          type: string
          format: byte
          description: Base64-encoded key
        version:
          type: integer
          format: int64
          nullable: true
          description: Version; absent when not set

    NamespacePolicyRow:
      type: object
      properties:
        namespace:
          type: string
          example: "_meta"
        version:
          type: integer
          format: int64
          example: 0
        policy:
          type: string
          description: Human-readable policy expression
          example: "1-of(Org1MSP.peer)"
        certificates:
          type: array
          description: PEM-encoded X.509 certificates
          items:
            type: string
        msp_ids:
          type: array
          items:
            type: string
          example: ["Org1MSP", "OrdererMSP"]
        endpoints:
          type: array
          items:
            type: string
          example: ["localhost:7050"]
        hash_algorithm:
          type: string
          example: "SHA256"

    NamespacePoliciesResponse:
      type: object
      properties:
        policies:
          type: array
          items:
            $ref: "#/components/schemas/NamespacePolicyRow"

  responses:
    BadRequest:
      description: Invalid query or path parameter
      content:
        text/plain:
          schema:
            type: string
    NotFound:
      description: Resource not found
      content:
        text/plain:
          schema:
            type: string
    InternalError:
      description: Internal server error
      content:
        text/plain:
          schema:
            type: string
